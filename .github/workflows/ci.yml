name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build, test, and schema check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build workspaces
        run: npm run build

      - name: Run backend tests
        run: npm --workspace backend run test

      - name: Verify Drizzle migrations
        run: npm run db:generate

      - name: Ensure generated files are committed
        run: |
          git diff --exit-code
          test -z "$(git status --short)"

  docker:
    name: Build Railway image
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --pull -t portapay:ci .

