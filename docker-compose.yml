services:
  postgres:
    image: postgres:16-alpine
    container_name: portapay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portapay
      POSTGRES_PASSWORD: portapay
      POSTGRES_DB: portapay
    ports:
      - "5432:5432"
    volumes:
      - portapay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portapay -d portapay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portapay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - portapay-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  portapay-postgres-data:
  portapay-redis-data: